services:
  - type: web
    name: photocull
    runtime: docker
    # ── Storage ─────────────────────────────────────────────────────────────
    # FREE TIER: /tmp is always writable but files are lost on restart.
    # Fine for beta testing — users just need to finish a session in one go.
    #
    # PAID UPGRADE (~$9.50/mo total): uncomment the disk block and change
    # STORAGE_DIR to /data/photocull for files that survive restarts.
    #
    # disk:
    #   name: photocull-storage
    #   mountPath: /data
    #   sizeGB: 10
    envVars:
      - key: STORAGE_DIR
        value: /tmp/photocull
      - key: ANTHROPIC_API_KEY
        sync: false          # set manually in Render dashboard
      - key: BETA_ACCESS_CODE
        sync: false          # set manually in Render dashboard
